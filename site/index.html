<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sideload IPAs · Zero ITMS Service</title>
  <meta name="description" content="Zero ITMS App 分发 · 通过 itms-services 安装重签名 IPA。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- ?v= 资源版本号：更新 JS/CSS 后递增，用于绕过 Cloudflare/浏览器缓存 -->
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <main class="page">
    <div class="inner">

      <header class="header">
        <div class="header-top">
          <div class="title-block">
            <span class="eyebrow">Zero ITMS Service</span>
            <h1 class="title">Sideload IPAs</h1>
          </div>
          <span class="count" id="count" aria-live="polite"></span>
        </div>

        <div class="search">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
          </svg>
          <input id="search" type="search" placeholder="搜索应用…" aria-label="搜索应用" autocomplete="off" spellcheck="false">
        </div>
      </header>

      <div class="grid" id="grid"></div>

      <p class="empty" id="empty" hidden>没有匹配「<span id="empty-query"></span>」的应用</p>

    </div>
  </main>

  <!-- 数据：每个 app 一条记录，新增 app 只需在此追加 -->
  <script src="apps.js?v=7"></script>
  <!-- 可复用组件：<app-card> -->
  <script src="app-card.js?v=2"></script>
  <!-- 页面装配：渲染卡片 + 搜索过滤 -->
  <script src="app.js?v=2"></script>
</body>
</html>
