# Signing tasks configuration (TOML)

# Define one or more signing tasks using the [[tasks]] array.
# For each task, set:
# - task_name: Identifier for this task (used for profile lookup)
# - app_name: Human-friendly app name (used for profile naming: "{app_name} Dev")
# - bundle_id: iOS Bundle Identifier (must exist in Apple Developer Portal)
# - repo_url / ipa_url: source of the unsigned IPA (mutually exclusive)
# - slug: Optional. Stable key for R2 object paths and the apps.json registry /
#   download-page URLs (defaults to a slugified app_name). Keep the legacy
#   download-page directory value so existing links stay stable.
# - icon_path: Optional. Where to get the app's icon. Nothing is inferred —
#   upstream layouts differ too much — so each task names its own source:
#     "<path>"    a path inside repo_url, fetched at the release tag so the
#                 icon matches the published build
#     "https://…" any absolute URL
#     "ipa:"      the signed IPA itself; use when the repository has no square
#                 master (caps out at 152x152, so prefer a repo asset)
#   Any raster format is accepted (detected by magic bytes, not extension —
#   upstream does commit WebP named .png) and normalised to a square PNG of at
#   most 512x512. Point it at a SQUARE, full-bleed master: the download page
#   rounds corners with a CSS mask, so a pre-rounded source double-rounds.
#   Omit it to leave the existing icon untouched.
#
# After each resign the pipeline uploads the IPA to Cloudflare R2 under a
# versioned key (apps/<slug>/<version>/<App>.ipa) and merges the result into
# the site/apps.json registry on R2 — the single data source the Vercel-hosted
# download page and itms.plist route read. The bucket, account and public base
# URL come from environment variables (R2_*), never from this file.

# Optional R2 object-layout overrides (defaults shown).
# [r2]
# key_prefix = "apps"              # object key prefix for IPAs and icons
# apps_json_key = "site/apps.json" # registry key consumed by the Vercel front-end

[[tasks]]
task_name = "JHenTai"
app_name = "JHenTai"
bundle_id = "io.zeroclover.app.jhentai"
repo_url = "https://github.com/jiangtian616/JHenTai"
slug = "JHenTai"
icon_path = "ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png"

[[tasks]]
task_name = "Eros FE"
app_name = "Eros FE"
bundle_id = "io.zeroclover.apps.eros-fe"
repo_url = "https://github.com/erosTeam/eros_fe"
slug = "fehviewer" # legacy download-page directory name
# Contents.json names Icon.png as the 1024 master. The Icon-App-1024x1024@1x.png
# sitting beside it is an orphaned Flutter placeholder no longer referenced by
# the asset catalog — using it would ship the stock Flutter logo.
icon_path = "ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon.png"

[[tasks]]
task_name = "Asspp"
app_name = "Asspp"
bundle_id = "io.zeroclover.app.asspp"
repo_url = "https://github.com/Lakr233/Asspp"
slug = "Asspp"
# asspp_appstore.png is the macOS icon (pre-rounded + inset); asspp.png is the
# iOS "universal" 1024x1024 entry, i.e. the square master this page wants.
icon_path = "Asspp/App/Assets.xcassets/AppIcon.appiconset/asspp.png"

[[tasks]]
task_name = "PiliPlus"
app_name = "PiliPlus"
bundle_id = "io.zeroclover.app.piliplus"
repo_url = "https://github.com/bggRGjQaUbCoE/PiliPlus"
slug = "PiliPlus"
icon_path = "ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png"

[[tasks]]
task_name = "LiveContainer"
app_name = "LiveContainer"
bundle_id = "io.zeroclover.app.livecontainer"
repo_url = "https://github.com/LiveContainer/LiveContainer"
release_glob = "LiveContainer.ipa"
slug = "LiveContainer"
publication_enabled = true

[tasks.signing]
id_strategy = "preserve-source-suffix"
unknown_profile_bundles = "error"
profile_type = "IOS_APP_DEVELOPMENT"
# The Account Holder confirmed this group is registered and assigned to every
# configured App ID. The public API exposes APP_GROUPS but not this relationship;
# generated profiles still have to authorize the exact group before signing.
manual_app_group_associations = ["shared"]

[tasks.signing.app_groups]
shared = "group.io.zeroclover.app.livecontainer"

[[tasks.signing.bundles]]
source_bundle_id = "com.kdt.livecontainer"
target_bundle_id = "io.zeroclover.app.livecontainer"
role = "root"
required_capabilities = ["APP_GROUPS", "HEALTHKIT", "INCREASED_MEMORY_LIMIT", "KEYCHAIN_SHARING", "CLINICAL_HEALTH_RECORDS", "HEALTHKIT_BACKGROUND_DELIVERY"]
entitlement_mode = "template"
entitlements_file = "configs/signing/livecontainer/root-process.plist"

[[tasks.signing.bundles]]
source_bundle_id = "com.kdt.livecontainer.LiveProcess"
required_capabilities = ["APP_GROUPS", "HEALTHKIT", "INCREASED_MEMORY_LIMIT", "KEYCHAIN_SHARING", "CLINICAL_HEALTH_RECORDS", "HEALTHKIT_BACKGROUND_DELIVERY"]
entitlement_mode = "template"
entitlements_file = "configs/signing/livecontainer/root-process.plist"

[[tasks.signing.bundles]]
source_bundle_id = "com.kdt.livecontainer.LaunchAppExtension"
required_capabilities = ["APP_GROUPS"]
entitlement_mode = "profile"

[[tasks.signing.bundles]]
source_bundle_id = "com.kdt.livecontainer.ShareExtension"
required_capabilities = ["APP_GROUPS"]
entitlement_mode = "profile"

[[tasks]]
task_name = "StikDebug"
app_name = "StikDebug"
bundle_id = "io.zeroclover.app.stikdebug"
repo_url = "https://github.com/StephenDev0/StikDebug"
slug = "StikDebug"
# Every raster StikDebug commits is a pre-rounded Icon Composer export, and its
# only square master is a .icon bundle of SVG layers. Take the (square, 152x152)
# icon out of the signed IPA instead.
icon_path = "ipa:"
