# Signing tasks configuration (TOML)

# Define one or more signing tasks using the [[tasks]] array.
# For each task, set:
# - task_name: Identifier for this task (used for profile lookup)
# - app_name: Human-friendly app name (used for profile naming: "{app_name} Dev")
# - bundle_id: iOS Bundle Identifier (must exist in Apple Developer Portal)
# - ipa_url: Direct download URL of the original IPA to sign
# - asset_server_path: Destination path on the asset server; if it ends with '/', the signed file name will be appended

# Download-page / publishing settings. Optional: when omitted, these are derived
# from the first path segment of asset_server_path (the public host). After each
# resign the pipeline generates <app dir>/itms.plist (itms-services manifest) from
# the IPA's actual bundle id + version, then refreshes and deploys the download page.
[site]
# Public base URL where signed assets are served (used for itms.plist URLs + card links)
public_base_url = "https://itms.zeroclover.io"
# Remote directory (on the asset server) where the download page (site/) is deployed
deploy_path = "/itms.zeroclover.io/"

[[tasks]]
task_name = "JHenTai"
app_name = "JHenTai"
bundle_id = "io.zeroclover.app.jhentai"
repo_url = "https://github.com/jiangtian616/JHenTai"
asset_server_path = "/itms.zeroclover.io/JHenTai/JHenTai.ipa"

