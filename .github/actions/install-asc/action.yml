name: Install checksum-verified App Store Connect CLI
description: Download, verify, and install a pinned asc executable
inputs:
  version:
    description: asc release version
    required: true
  asset:
    description: Release asset filename
    required: true
  sha256:
    description: Reviewed asset SHA-256
    required: true
runs:
  using: composite
  steps:
    - name: Download and install asc
      shell: bash
      env:
        ASC_VERSION: ${{ inputs.version }}
        ASC_ASSET: ${{ inputs.asset }}
        ASC_SHA256: ${{ inputs.sha256 }}
      run: |
        set -euo pipefail
        umask 077
        base="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
        curl -fLsS -o "$RUNNER_TEMP/$ASC_ASSET" "$base/$ASC_ASSET"
        curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
        if command -v sha256sum >/dev/null; then
          (cd "$RUNNER_TEMP" && grep -F "  $ASC_ASSET" asc_checksums.txt | sha256sum -c -)
          printf '%s  %s\n' "$ASC_SHA256" "$RUNNER_TEMP/$ASC_ASSET" | sha256sum -c -
        else
          (cd "$RUNNER_TEMP" && grep -F "  $ASC_ASSET" asc_checksums.txt | shasum -a 256 -c -)
          printf '%s  %s\n' "$ASC_SHA256" "$RUNNER_TEMP/$ASC_ASSET" | shasum -a 256 -c -
        fi
        sudo install -m 0755 "$RUNNER_TEMP/$ASC_ASSET" /usr/local/bin/asc
        test "$(asc version | cut -d ' ' -f 1)" = "$ASC_VERSION"
        printf 'asc repository=rorkai/App-Store-Connect-CLI version=%s sha256=%s\n' \
          "$ASC_VERSION" "$ASC_SHA256"
