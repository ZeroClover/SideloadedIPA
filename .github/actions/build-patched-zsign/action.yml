name: Build patched zsign
description: Build and cache the checksum-pinned per-profile-entitlements zsign
inputs:
  source-commit:
    description: Reviewed upstream source commit
    required: true
  source-sha256:
    description: SHA-256 of the GitHub source archive
    required: true
  version:
    description: Expected patched executable version
    required: false
    default: 1.1.1+sideloadedipa.3
outputs:
  executable:
    description: Absolute path to patched zsign
    value: ${{ steps.result.outputs.executable }}
  sha256:
    description: Patched executable SHA-256
    value: ${{ steps.result.outputs.sha256 }}
runs:
  using: composite
  steps:
    - name: Restore patched zsign cache
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ runner.temp }}/sideloadedipa-zsign/bin
        key: patched-zsign-${{ runner.os }}-${{ runner.arch }}-${{ inputs.source-commit }}-${{ hashFiles('patches/zsign/**') }}

    - name: Build checksum-pinned patched zsign
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      env:
        ZSIGN_SOURCE_COMMIT: ${{ inputs.source-commit }}
        ZSIGN_SOURCE_SHA256: ${{ inputs.source-sha256 }}
        ZSIGN_EXPECTED_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        source_dir="$RUNNER_TEMP/sideloadedipa-zsign/source"
        archive="$RUNNER_TEMP/sideloadedipa-zsign/source.tar.gz"
        mkdir -p "$source_dir" "$RUNNER_TEMP/sideloadedipa-zsign/bin"
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt-get update
          sudo apt-get install --yes g++ libssl-dev pkg-config
          build_dir="build/linux"
        else
          brew install openssl@3
          build_dir="build/macos"
        fi
        curl -fLsS -o "$archive" \
          "https://codeload.github.com/zhlynn/zsign/tar.gz/$ZSIGN_SOURCE_COMMIT"
        if command -v sha256sum >/dev/null; then
          printf '%s  %s\n' "$ZSIGN_SOURCE_SHA256" "$archive" | sha256sum -c -
        else
          printf '%s  %s\n' "$ZSIGN_SOURCE_SHA256" "$archive" | shasum -a 256 -c -
        fi
        tar -xzf "$archive" --strip-components=1 -C "$source_dir"
        git -C "$source_dir" apply --check --unidiff-zero \
          "$GITHUB_WORKSPACE/patches/zsign/v1.1.1-per-profile-entitlements.patch"
        git -C "$source_dir" apply --unidiff-zero \
          "$GITHUB_WORKSPACE/patches/zsign/v1.1.1-per-profile-entitlements.patch"
        make -C "$source_dir/$build_dir" clean
        make -C "$source_dir/$build_dir" VERSION="$ZSIGN_EXPECTED_VERSION" -j"$(getconf _NPROCESSORS_ONLN || sysctl -n hw.ncpu)"
        install -m 0755 "$source_dir/bin/zsign" "$RUNNER_TEMP/sideloadedipa-zsign/bin/zsign"

    - name: Verify patched zsign
      id: result
      shell: bash
      env:
        ZSIGN_EXPECTED_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        executable="$RUNNER_TEMP/sideloadedipa-zsign/bin/zsign"
        test "$("$executable" -v)" = "version: $ZSIGN_EXPECTED_VERSION"
        if command -v sha256sum >/dev/null; then
          sha256="$(sha256sum "$executable" | cut -d ' ' -f 1)"
        else
          sha256="$(shasum -a 256 "$executable" | cut -d ' ' -f 1)"
        fi
        echo "executable=$executable" >> "$GITHUB_OUTPUT"
        echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
