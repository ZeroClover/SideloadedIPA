name: Checksum-pinned integration

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checksum-pinned-integration
  cancel-in-progress: false

jobs:
  livecontainer-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SIDELOADEDIPA_RUN_LIVECONTAINER_INTEGRATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install frozen dependencies
        run: uv sync --frozen

      - name: Run checksum-pinned integration tests
        run: uv run pytest --no-cov -m integration tests/test_livecontainer_integration.py
