name: Seed R2 (one-time migration)

# One-off bootstrap for the serverless migration (plan P1): copies the pipeline
# apps' card icons from the legacy server to R2. apps.json needs no seeding —
# the first full CI build (P4) generates it. Delete this file in P6 (retirement).

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r2-seed
  cancel-in-progress: false

jobs:
  seed:
    name: Seed R2 bucket
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
      # Signing region pinned to the bucket's location hint ("auto" also works)
      R2_REGION: apac
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run seed
        run: uv run python scripts/seed_r2.py
