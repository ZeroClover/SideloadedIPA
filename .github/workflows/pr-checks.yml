name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  validate-setup:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Install Python dependencies
        run: uv sync --frozen
      
      - name: Install dependencies
        env:
          BUNDLE_FROZEN: "true"
        run: |
          # Homebrew now ignores formulae from untrusted third-party taps;
          # trust the ones we rely on (asc, sshpass) plus the runner's aws/tap.
          brew trust --tap rudrankriyam/tap hudochenkov/sshpass aws/tap
          brew update
          brew tap rudrankriyam/tap
          brew install hudochenkov/sshpass/sshpass asc
          gem install bundler:4.0.13
          bundle _4.0.13_ install --jobs 4 --retry 3
      
      - name: Validate ASC authentication
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_BYPASS_KEYCHAIN: "1"
        run: asc devices list --limit 1 --output json > /dev/null
      
      - name: Validate config syntax
        run: uv run python -c "import tomllib; tomllib.load(open('configs/tasks.toml', 'rb'))"
