name: PR Checks

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      debug:
        description: Keep the validation runner available over SSH
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ASC_VERSION: "3.1.1"
      ASC_LINUX_AMD64_SHA256: "57cca59153eda109faf18d72c8bb0989ed0ee6e0a3082ce73ffa08174afbf2fd"
      ZSIGN_SOURCE_COMMIT: "d6e929c97b5b564c2cc1f82afe226a44da7149a0"
      ZSIGN_SOURCE_SHA256: "d9b1577da22a766eabbe1eeb5fc17cc2c4f060e3411a20713f9814fc30f6a670"
      ACTIONLINT_VERSION: "1.7.12"
      ACTIONLINT_LINUX_AMD64_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install locked Python dependencies
        run: uv sync --frozen

      - name: Install checksum-verified App Store Connect CLI
        uses: ./.github/actions/install-asc
        with:
          version: ${{ env.ASC_VERSION }}
          asset: asc_${{ env.ASC_VERSION }}_linux_amd64
          sha256: ${{ env.ASC_LINUX_AMD64_SHA256 }}

      - name: Build cached patched zsign
        id: patched-zsign
        uses: ./.github/actions/build-patched-zsign
        with:
          source-commit: ${{ env.ZSIGN_SOURCE_COMMIT }}
          source-sha256: ${{ env.ZSIGN_SOURCE_SHA256 }}

      - name: Run pytest with package coverage gate
        env:
          ZSIGN_BIN: ${{ steps.patched-zsign.outputs.executable }}
          ZSIGN_SHA256: ${{ steps.patched-zsign.outputs.sha256 }}
        run: uv run pytest

      - name: Check Python formatting and import order
        run: |
          uv run black --check scripts/ src/sideloadedipa/
          uv run isort --check-only scripts/ src/sideloadedipa/

      - name: Run strict Python type checks
        run: |
          uv run mypy src/sideloadedipa
          uv run mypy scripts/

      - name: Install checksum-verified actionlint
        run: |
          set -euo pipefail
          asset="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asset" "$base/$asset"
          printf '%s  %s\n' "$ACTIONLINT_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$asset" \
            | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version

      - name: Validate workflow syntax, expressions, and shell
        run: '"$RUNNER_TEMP/actionlint" -no-color .github/workflows/*.yml'

      - name: Audit workflows and composite actions
        run: uv run zizmor --strict-collection --min-severity high .

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install locked web dependencies
        working-directory: web
        run: npm ci

      - name: Check plist golden files
        working-directory: web
        run: npm run test

      - name: Build web application
        working-directory: web
        run: npm run build

      - name: "Debug: Start SSH session"
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.debug == true }}
        uses: ./.github/actions/ssh-debug
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}
