name: PR Checks

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      debug:
        description: Keep the Python test runner available over SSH
        required: false
        default: false
        type: boolean

jobs:
  validate-setup:
    runs-on: ubuntu-latest
    env:
      # App Store Connect CLI release whose prebuilt Linux binary we download
      ASC_VERSION: "2.4.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install asc (App Store Connect CLI)
        run: |
          set -euo pipefail
          # Official prebuilt Linux binary, checksum-verified before use.
          asc_bin="asc_${ASC_VERSION}_linux_amd64"
          base="https://github.com/rudrankriyam/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asc_bin" "$base/$asc_bin"
          curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
          (cd "$RUNNER_TEMP" && grep -F "$asc_bin" asc_checksums.txt | sha256sum -c -)
          sudo install -m 0755 "$RUNNER_TEMP/$asc_bin" /usr/local/bin/asc
          asc --version

      - name: Validate ASC authentication
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_BYPASS_KEYCHAIN: "1"
        run: asc devices list --limit 1 --output json > /dev/null

      - name: Validate config syntax
        run: uv run python -c "import tomllib; tomllib.load(open('configs/tasks.toml', 'rb'))"

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run pytest with package coverage gate
        run: uv run pytest

      - name: Lint (black + isort)
        run: |
          uv run black --check scripts/
          uv run isort --check-only scripts/
          uv run black --check src/sideloadedipa/ --exclude 'src/sideloadedipa/legacy/'
          uv run isort --check-only src/sideloadedipa/ --skip-glob '*/legacy/*'

      - name: Type check new package
        run: uv run mypy src/sideloadedipa

      - name: Type check legacy scripts
        # Non-blocking: strict-mode debt predates this check (run_signing.py /
        # sync_profiles_asc.py / check_changes.py). New/changed modules are
        # mypy-clean; fix the legacy debt before making this blocking.
        continue-on-error: true
        run: uv run mypy scripts/

      - name: "Debug: Start SSH session"
        if: ${{ always() && inputs.debug == true }}
        uses: ./.github/actions/ssh-debug
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check plist golden files
        run: npm run test

      - name: Build
        run: npm run build
