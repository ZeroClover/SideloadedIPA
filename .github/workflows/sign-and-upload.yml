name: Sign and Upload IPAs

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: Enable SSH Debug
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: Force full rebuild (ignore cache)
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [sign_ipas]

permissions:
  # read-only: the pipeline no longer commits anything back (apps.json lives on R2)
  contents: read

concurrency:
  group: sign-and-upload
  cancel-in-progress: false

jobs:
  sign-and-upload:
    name: Sign & Upload IPAs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ZSIGN_SOURCE_COMMIT: "d6e929c97b5b564c2cc1f82afe226a44da7149a0"
      ZSIGN_SOURCE_SHA256: "d9b1577da22a766eabbe1eeb5fc17cc2c4f060e3411a20713f9814fc30f6a670"
      ASC_VERSION: "3.1.1"
      ASC_LINUX_AMD64_SHA256: "57cca59153eda109faf18d72c8bb0989ed0ee6e0a3082ce73ffa08174afbf2fd"
      # Signing region pinned to the bucket's location hint.
      R2_REGION: apac
      VERCEL_REVALIDATE_URL: ${{ vars.VERCEL_REVALIDATE_URL || 'https://itms.zeroclover.io/api/revalidate' }}
      FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version-file: "pyproject.toml"
          python-version: "3.11.15"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install and verify locked Python toolchain
        run: |
          set -euo pipefail
          uv sync --frozen
          test "$(uv --version | awk '{print $2}')" = "0.11.31"
          test "$(uv run --frozen python -c 'import platform; print(platform.python_version())')" = "$(tr -d '\n' < .python-version)"

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: work/cache
          key: pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('uv.lock', 'configs/tasks.toml', 'src/sideloadedipa/**', 'patches/zsign/**') }}-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('uv.lock', 'configs/tasks.toml', 'src/sideloadedipa/**', 'patches/zsign/**') }}-
            pipeline-cache-v2-${{ runner.os }}-

      - name: Preflight - install checksum-verified App Store Connect CLI
        uses: ./.github/actions/install-asc
        with:
          version: ${{ env.ASC_VERSION }}
          asset: asc_${{ env.ASC_VERSION }}_linux_amd64
          sha256: ${{ env.ASC_LINUX_AMD64_SHA256 }}

      - name: Preflight - build cached qualified zsign
        id: patched-zsign
        uses: ./.github/actions/build-patched-zsign
        with:
          source-commit: ${{ env.ZSIGN_SOURCE_COMMIT }}
          source-sha256: ${{ env.ZSIGN_SOURCE_SHA256 }}

      - name: Inventory and aggregate policy preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sideloadedipa-reports"
          uv run sideloadedipa inspect --run-id "$GITHUB_RUN_ID" --json \
            > "$RUNNER_TEMP/sideloadedipa-reports/01-inspect.json"

      - name: Apple plan and apply - sync package profiles
        env:
          APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_BYPASS_KEYCHAIN: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          uv run sideloadedipa sync --apply --run-id "$GITHUB_RUN_ID" --json \
            > "$RUNNER_TEMP/sideloadedipa-reports/03-apple-apply.json"
          jq -e -S '.resource_plan | select(type == "object")' \
            "$RUNNER_TEMP/sideloadedipa-reports/03-apple-apply.json" \
            > "$RUNNER_TEMP/sideloadedipa-reports/02-apple-plan.json"

      - name: Sign selected tasks
        id: package-signing
        env:
          ZSIGN_BIN: ${{ steps.patched-zsign.outputs.executable }}
          ZSIGN_SHA256: ${{ steps.patched-zsign.outputs.sha256 }}
          APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=()
          if [[ "${FORCE_REBUILD}" == "true" || "${FORCE_REBUILD}" == "1" ]]; then
            args+=(--force-rebuild)
          fi
          uv run sideloadedipa sign --run-id "$GITHUB_RUN_ID" --json "${args[@]}" \
            > "$RUNNER_TEMP/sideloadedipa-reports/04-sign.json"

      - name: Independently reopen and verify signed IPAs
        id: package-verification
        env:
          ZSIGN_BIN: ${{ steps.patched-zsign.outputs.executable }}
          ZSIGN_SHA256: ${{ steps.patched-zsign.outputs.sha256 }}
          APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          uv run sideloadedipa verify --publish --run-id "$GITHUB_RUN_ID" --json \
            > "$RUNNER_TEMP/sideloadedipa-reports/05-verify.json"

      - name: Publish verified batch
        id: package-publication
        env:
          ZSIGN_BIN: ${{ steps.patched-zsign.outputs.executable }}
          ZSIGN_SHA256: ${{ steps.patched-zsign.outputs.sha256 }}
          APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          VERCEL_REVALIDATE_SECRET: ${{ secrets.VERCEL_REVALIDATE_SECRET }}
        run: |
          set -euo pipefail
          uv run sideloadedipa publish --run-id "$GITHUB_RUN_ID" --json \
            > "$RUNNER_TEMP/sideloadedipa-reports/06-publish.json"

      - name: Upload redacted run report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signing-run-report-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/sideloadedipa-reports/*.json
            work/reports/*.json
            work/pipeline/**/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Save cache
        if: ${{ success() }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: work/cache
          key: pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('uv.lock', 'configs/tasks.toml', 'src/sideloadedipa/**', 'patches/zsign/**') }}-${{ github.run_id }}

      - name: Notify webhook
        if: ${{ always() && (job.status == 'success' || job.status == 'failure') }}
        env:
          WEBHOOK_URL: ${{ secrets.Instatus_Webhook_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          payload='{"trigger":"down"}'
          if [[ "${JOB_STATUS}" == "success" ]]; then
            payload='{"trigger":"up"}'
          fi
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK_URL"

      - name: "Debug: Start SSH session"
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.debug == true }}
        uses: ./.github/actions/ssh-debug
        env:
          ZSIGN_BIN: ${{ steps.patched-zsign.outputs.executable }}
          ZSIGN_SHA256: ${{ steps.patched-zsign.outputs.sha256 }}
          APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          P12_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_BYPASS_KEYCHAIN: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          VERCEL_REVALIDATE_SECRET: ${{ secrets.VERCEL_REVALIDATE_SECRET }}
          WEBHOOK_URL: ${{ secrets.Instatus_Webhook_URL }}
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}
