name: Sign and Upload IPAs

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: Enable SSH Debug
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: Force full rebuild (ignore cache)
        required: false
        default: false
        type: boolean
      backend_qualification:
        description: Run the private multi-bundle backend qualification probe only
        required: false
        default: false
        type: boolean
      apple_state_probe:
        description: Run the read-only normalized Apple signing-state probe only
        required: false
        default: false
        type: boolean
      package_shadow:
        description: Run read-only package inventory and Apple planning only
        required: false
        default: false
        type: boolean
      multi_bundle_canary:
        description: Run the private non-publishing multi-bundle canary
        required: false
        default: false
        type: boolean
      qualification_apply:
        description: Add missing qualification App IDs and profiles before the probe
        required: false
        default: false
        type: boolean
      qualification_reset_names:
        description: Recreate agent-created qualification resources with standard names
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [sign_ipas]

permissions:
  # read-only: the pipeline no longer commits anything back (apps.json lives on R2)
  contents: read

concurrency:
  group: sign-and-upload
  cancel-in-progress: false

jobs:
  sign-and-upload:
    name: Sign & Upload IPAs
    if: >-
      ${{ github.event_name != 'workflow_dispatch' ||
          (inputs.backend_qualification != true && inputs.apple_state_probe != true &&
           inputs.package_shadow != true && inputs.multi_bundle_canary != true) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ZSIGN_VERSION: "v1.1.1"
      ZSIGN_LINUX_MUSL_SHA256: "9880b0e1290dea211481fd031bcca8d0d7f3f09ba1c6a89743b3422df1ac14b9"
      ASC_VERSION: "3.1.1"
      ASC_LINUX_AMD64_SHA256: "57cca59153eda109faf18d72c8bb0989ed0ee6e0a3082ce73ffa08174afbf2fd"
      # Apple Developer credentials
      APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
      APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
      # App Store Connect API (env-based auth, no temp key file needed)
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_BYPASS_KEYCHAIN: "1"
      # Cloudflare R2 object storage (S3-compatible publishing target)
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
      # Signing region pinned to the bucket's location hint (avoids picking up
      # an invalid region from ambient AWS config; "auto" also works)
      R2_REGION: apac
      # Vercel on-demand revalidation hook (download-page / plist cache refresh)
      VERCEL_REVALIDATE_SECRET: ${{ secrets.VERCEL_REVALIDATE_SECRET }}
      # Hook URL: production default is the live domain; override with the repo
      # variable (e.g. https://sideloadedipa.vercel.app/api/revalidate) while
      # testing pre-cutover, then delete the variable at DNS switchover.
      VERCEL_REVALIDATE_URL: ${{ vars.VERCEL_REVALIDATE_URL || 'https://itms.zeroclover.io/api/revalidate' }}
      # GitHub Token for API access (authenticated rate limits)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Enable verbose logging in scripts (used for GitHub API rate limit debug)
      DEBUG: ${{ github.event.inputs.debug || 'false' }}
      # Force rebuild flag
      FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            work/cache
          key: pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('uv.lock', 'configs/tasks.toml', 'src/sideloadedipa/**', 'patches/zsign/**') }}-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('uv.lock', 'configs/tasks.toml', 'src/sideloadedipa/**', 'patches/zsign/**') }}-
            pipeline-cache-v2-${{ runner.os }}-

      - name: Preserve cached device list for comparison
        run: |
          mkdir -p work/cache-old
          if [ -f work/cache/device-list.json ]; then
            cp work/cache/device-list.json work/cache-old/device-list.json
            echo "Preserved cached device list for comparison"
          else
            echo "No cached device list found (first run)"
          fi

      - name: Preflight - install checksum-verified App Store Connect CLI
        shell: bash
        run: |
          set -euo pipefail
          asc_bin="asc_${ASC_VERSION}_linux_amd64"
          base="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asc_bin" "$base/$asc_bin"
          curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asc_bin" asc_checksums.txt | sha256sum -c -)
          printf '%s  %s\n' "$ASC_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$asc_bin" | sha256sum -c -
          sudo install -m 0755 "$RUNNER_TEMP/$asc_bin" /usr/local/bin/asc
          test "$(asc version | cut -d ' ' -f 1)" = "$ASC_VERSION"
          printf 'asc repository=rorkai/App-Store-Connect-CLI version=%s sha256=%s\n' \
            "$ASC_VERSION" "$ASC_LINUX_AMD64_SHA256"

      - name: Preflight - install checksum-verified zsign
        shell: bash
        run: |
          set -euo pipefail
          asset="zsign-linux-musl-static.tar.gz"
          base="https://github.com/zhlynn/zsign/releases/download/${ZSIGN_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asset" "$base/$asset"
          curl -fLsS -o "$RUNNER_TEMP/zsign_SHA256SUMS.txt" "$base/SHA256SUMS.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asset" zsign_SHA256SUMS.txt | sha256sum -c -)
          printf '%s  %s\n' "$ZSIGN_LINUX_MUSL_SHA256" "$RUNNER_TEMP/$asset" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP"
          echo "ZSIGN_BIN=$RUNNER_TEMP/zsign-musl" >> "$GITHUB_ENV"
          test "$("$RUNNER_TEMP/zsign-musl" -v)" = "version: ${ZSIGN_VERSION#v}"
          printf 'zsign repository=zhlynn/zsign version=%s archive_sha256=%s\n' \
            "$ZSIGN_VERSION" "$ZSIGN_LINUX_MUSL_SHA256"

      - name: Verify App Store Connect credentials
        run: asc devices list --limit 1 --output json > /dev/null

      - name: Check Entitlements Profile
        id: check-entitlements
        run: |
          uv run python scripts/sync_profiles_asc.py check

      - name: Check App Version
        id: check-version
        env:
          DEVICES_CHANGED: ${{ steps.check-entitlements.outputs.devices_changed }}
        run: |
          uv run python scripts/check_changes.py

      - name: Sync Entitlements Profile
        if: ${{ steps.check-version.outputs.rebuild_all == 'true' || steps.check-version.outputs.rebuild_tasks != '[]' }}
        env:
          DEVICES_CHANGED: ${{ steps.check-entitlements.outputs.devices_changed }}
          ALL_PROFILES_PRESENT: ${{ steps.check-entitlements.outputs.all_profiles_present }}
          MISSING_PROFILES: ${{ steps.check-entitlements.outputs.missing_profiles }}
          REBUILD_ALL: ${{ steps.check-version.outputs.rebuild_all }}
          REBUILD_TASKS: ${{ steps.check-version.outputs.rebuild_tasks }}
        run: |
          set -euo pipefail
          echo "DEVICES_CHANGED=${DEVICES_CHANGED}"
          echo "ALL_PROFILES_PRESENT=${ALL_PROFILES_PRESENT}"
          echo "MISSING_PROFILES=${MISSING_PROFILES}"
          echo "REBUILD_ALL=${REBUILD_ALL}"
          echo "REBUILD_TASKS=${REBUILD_TASKS}"
          if [[ "${DEVICES_CHANGED}" == "true" ]]; then
            echo "Device list changed - regenerating all provisioning profiles"
            uv run python scripts/sync_profiles_asc.py
          else
            echo "Device list unchanged - downloading existing profiles (create missing if needed)"
            SKIP_PROFILE_REGENERATION=true uv run python scripts/sync_profiles_asc.py
          fi

      - name: Run signer
        id: legacy-signing
        env:
          REBUILD_ALL: ${{ steps.check-version.outputs.rebuild_all }}
          REBUILD_TASKS: ${{ steps.check-version.outputs.rebuild_tasks }}
        run: uv run python scripts/run_signing.py

      - name: Upload redacted run report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: signing-run-report-${{ github.run_id }}
          path: ${{ runner.temp }}/sideloadedipa-reports/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Save cache
        if: ${{ success() && steps.legacy-signing.outcome == 'success' }}
        uses: actions/cache/save@v6.1.0
        continue-on-error: true
        with:
          path: |
            work/cache
          key: pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('uv.lock', 'configs/tasks.toml', 'src/sideloadedipa/**', 'patches/zsign/**') }}-${{ github.run_id }}

      - name: "Debug: Start SSH session"
        if: ${{ always() && github.event_name == 'workflow_dispatch' && (github.event.inputs.debug == true || github.event.inputs.debug == 'true' || github.event.inputs.debug == '1') }}
        uses: ./.github/actions/ssh-debug
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}

      - name: Notify webhook
        if: ${{ always() && (job.status == 'success' || job.status == 'failure') }}
        env:
          WEBHOOK_URL: ${{ secrets.Instatus_Webhook_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          payload='{"trigger":"down"}'
          if [[ "${JOB_STATUS}" == "success" ]]; then
            payload='{"trigger":"up"}'
          fi
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK_URL"

  package-shadow:
    name: Read-only package pipeline shadow
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_shadow == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ASC_VERSION: "3.1.1"
      ASC_LINUX_AMD64_SHA256: "57cca59153eda109faf18d72c8bb0989ed0ee6e0a3082ce73ffa08174afbf2fd"
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_BYPASS_KEYCHAIN: "1"
      APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
      APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Preflight - checkout
        uses: actions/checkout@v7.0.1

      - name: Preflight - set up Python with uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Preflight - install Python dependencies
        run: uv sync --frozen

      - name: Preflight - install checksum-verified App Store Connect CLI
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          asc_bin="asc_${ASC_VERSION}_linux_amd64"
          base="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asc_bin" "$base/$asc_bin"
          curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asc_bin" asc_checksums.txt | sha256sum -c -)
          printf '%s  %s\n' "$ASC_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$asc_bin" | sha256sum -c -
          sudo install -m 0755 "$RUNNER_TEMP/$asc_bin" /usr/local/bin/asc
          test "$(asc version | cut -d ' ' -f 1)" = "$ASC_VERSION"

      - name: Preflight - verify file-backed manifest handoff
        run: |
          uv run python scripts/run_workflow_fixture.py \
            --output "$RUNNER_TEMP/sideloadedipa-shadow/fixture"

      - name: Inventory - inspect every current task without mutation
        id: shadow-inventory
        shell: bash
        run: |
          set -euo pipefail
          report_dir="$RUNNER_TEMP/sideloadedipa-shadow"
          mkdir -p "$report_dir"
          set +e
          uv run sideloadedipa inspect --json > "$report_dir/inventory.json"
          status=$?
          set -e
          if (( status > 1 )); then
            exit "$status"
          fi
          jq empty "$report_dir/inventory.json"
          printf '%s\n' "$status" > "$report_dir/inventory-exit-code.txt"

      - name: Apple plan - read-only resource plan for every current task
        id: shadow-apple-plan
        shell: bash
        run: |
          set -euo pipefail
          report_dir="$RUNNER_TEMP/sideloadedipa-shadow"
          set +e
          uv run sideloadedipa plan --json > "$report_dir/apple-plan.json"
          status=$?
          set -e
          if (( status > 1 )); then
            exit "$status"
          fi
          jq empty "$report_dir/apple-plan.json"
          printf '%s\n' "$status" > "$report_dir/apple-plan-exit-code.txt"

      - name: Apple apply, signing, verification, and publication - enforce shadow mode
        shell: bash
        run: |
          set -euo pipefail
          report_dir="$RUNNER_TEMP/sideloadedipa-shadow"
          jq -n \
            --arg inventory_status "$(cat "$report_dir/inventory-exit-code.txt")" \
            --arg plan_status "$(cat "$report_dir/apple-plan-exit-code.txt")" \
            '{schema_version: 1, mode: "read-only-shadow", inventory_exit_code: ($inventory_status | tonumber), apple_plan_exit_code: ($plan_status | tonumber), apple_apply: "skipped", signing: "skipped", verification: "skipped", publication: "disabled"}' \
            > "$report_dir/shadow-summary.json"
          if env | cut -d= -f1 | grep -Eq '^(R2_ACCESS_KEY_ID|R2_SECRET_ACCESS_KEY)$'; then
            echo "R2 credentials must not be present in read-only shadow mode." >&2
            exit 1
          fi
          if grep -ERq 'BEGIN PRIVATE KEY|ASC_PRIVATE_KEY|APPLE_DEV_CERT_PASSWORD' "$report_dir"; then
            echo "A redacted shadow report contains a credential marker." >&2
            exit 1
          fi

      - name: Upload redacted shadow plans and reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: package-shadow-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/sideloadedipa-shadow/inventory.json
            ${{ runner.temp }}/sideloadedipa-shadow/apple-plan.json
            ${{ runner.temp }}/sideloadedipa-shadow/shadow-summary.json
            ${{ runner.temp }}/sideloadedipa-shadow/fixture/workflow-fixture-summary.json
          if-no-files-found: ignore
          retention-days: 3

      - name: "Debug: Start SSH session"
        if: ${{ always() && (inputs.debug == true || inputs.debug == 'true' || inputs.debug == '1') }}
        uses: ./.github/actions/ssh-debug
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}

  apple-state-probe:
    name: Probe normalized Apple signing state
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.apple_state_probe == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ASC_VERSION: "3.1.1"
      ASC_LINUX_AMD64_SHA256: "57cca59153eda109faf18d72c8bb0989ed0ee6e0a3082ce73ffa08174afbf2fd"
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_BYPASS_KEYCHAIN: "1"
      APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
      APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install checksum-verified App Store Connect CLI
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          asc_bin="asc_${ASC_VERSION}_linux_amd64"
          base="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asc_bin" "$base/$asc_bin"
          curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asc_bin" asc_checksums.txt | sha256sum -c -)
          printf '%s  %s\n' "$ASC_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$asc_bin" | sha256sum -c -
          sudo install -m 0755 "$RUNNER_TEMP/$asc_bin" /usr/local/bin/asc
          test "$(asc version | cut -d ' ' -f 1)" = "$ASC_VERSION"
          printf 'asc repository=rorkai/App-Store-Connect-CLI version=%s sha256=%s\n' \
            "$ASC_VERSION" "$ASC_LINUX_AMD64_SHA256"

      - name: Collect redacted read-only snapshot
        run: uv run python -m sideloadedipa.apple_state_probe

      - name: "Debug: Start SSH session"
        if: ${{ always() && (inputs.debug == true || inputs.debug == 'true' || inputs.debug == '1') }}
        uses: ./.github/actions/ssh-debug
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}

  backend-qualification:
    name: Private non-publishing multi-bundle canary
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.backend_qualification == true || inputs.multi_bundle_canary == true) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ASC_VERSION: "3.1.1"
      ASC_LINUX_AMD64_SHA256: "57cca59153eda109faf18d72c8bb0989ed0ee6e0a3082ce73ffa08174afbf2fd"
      ZSIGN_VERSION: "v1.1.1"
      ZSIGN_LINUX_MUSL_SHA256: "9880b0e1290dea211481fd031bcca8d0d7f3f09ba1c6a89743b3422df1ac14b9"
      ZSIGN_SOURCE_COMMIT: "d6e929c97b5b564c2cc1f82afe226a44da7149a0"
      ZSIGN_SOURCE_SHA256: "d9b1577da22a766eabbe1eeb5fc17cc2c4f060e3411a20713f9814fc30f6a670"
      APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
      APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_BYPASS_KEYCHAIN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Install checksum-verified App Store Connect CLI
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          asc_bin="asc_${ASC_VERSION}_linux_amd64"
          base="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asc_bin" "$base/$asc_bin"
          curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asc_bin" asc_checksums.txt | sha256sum -c -)
          printf '%s  %s\n' "$ASC_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$asc_bin" | sha256sum -c -
          sudo install -m 0755 "$RUNNER_TEMP/$asc_bin" /usr/local/bin/asc
          test "$(asc version | cut -d ' ' -f 1)" = "$ASC_VERSION"
          printf 'asc repository=rorkai/App-Store-Connect-CLI version=%s sha256=%s\n' \
            "$ASC_VERSION" "$ASC_LINUX_AMD64_SHA256"

      - name: Install checksum-verified zsign
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          asset="zsign-linux-musl-static.tar.gz"
          base="https://github.com/zhlynn/zsign/releases/download/${ZSIGN_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asset" "$base/$asset"
          curl -fLsS -o "$RUNNER_TEMP/zsign_SHA256SUMS.txt" "$base/SHA256SUMS.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asset" zsign_SHA256SUMS.txt | sha256sum -c -)
          printf '%s  %s\n' "$ZSIGN_LINUX_MUSL_SHA256" "$RUNNER_TEMP/$asset" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/backend-qualification/bin"
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP/backend-qualification/bin"
          install -m 0755 "$RUNNER_TEMP/backend-qualification/bin/zsign-musl" \
            "$RUNNER_TEMP/backend-qualification/zsign"
          test "$("$RUNNER_TEMP/backend-qualification/zsign" -v)" \
            = "version: ${ZSIGN_VERSION#v}"
          printf 'zsign executable sha256: '
          sha256sum "$RUNNER_TEMP/backend-qualification/zsign" | cut -d ' ' -f 1
          printf 'zsign repository=zhlynn/zsign version=%s archive_sha256=%s\n' \
            "$ZSIGN_VERSION" "$ZSIGN_LINUX_MUSL_SHA256"

      - name: Preflight - build pinned per-profile-entitlement zsign extension
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$RUNNER_TEMP/backend-qualification/zsign-source"
          archive="$RUNNER_TEMP/backend-qualification/zsign-source.tar.gz"
          sudo apt-get update
          sudo apt-get install --yes g++ libssl-dev pkg-config
          curl -fLsS -o "$archive" \
            "https://codeload.github.com/zhlynn/zsign/tar.gz/$ZSIGN_SOURCE_COMMIT"
          printf '%s  %s\n' "$ZSIGN_SOURCE_SHA256" "$archive" | sha256sum -c -
          mkdir -p "$source_dir"
          tar -xzf "$archive" --strip-components=1 -C "$source_dir"
          git -C "$source_dir" apply --check --unidiff-zero \
            "$GITHUB_WORKSPACE/patches/zsign/v1.1.1-per-profile-entitlements.patch"
          git -C "$source_dir" apply --unidiff-zero \
            "$GITHUB_WORKSPACE/patches/zsign/v1.1.1-per-profile-entitlements.patch"
          make -C "$source_dir/build/linux" clean
          make -C "$source_dir/build/linux" VERSION=1.1.1+sideloadedipa.1 -j"$(nproc)"
          install -m 0755 "$source_dir/bin/zsign" \
            "$RUNNER_TEMP/backend-qualification/zsign-per-profile"
          test "$("$RUNNER_TEMP/backend-qualification/zsign-per-profile" -v)" \
            = "version: 1.1.1+sideloadedipa.1"
          help_output="$("$RUNNER_TEMP/backend-qualification/zsign-per-profile" -h || true)"
          grep -F "Repeat to pair with repeated -m profiles." <<< "$help_output"
          printf 'extended zsign executable sha256: '
          sha256sum "$RUNNER_TEMP/backend-qualification/zsign-per-profile" | cut -d ' ' -f 1

      - name: Preflight - extract configured public signing certificate
        shell: bash
        env:
          P12_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          mkdir -p "$private_dir"
          printf '%s' "$APPLE_DEV_CERT_P12_ENCODED" | base64 --decode > "$private_dir/certificate.p12"
          openssl pkcs12 -legacy -in "$private_dir/certificate.p12" -nocerts -nodes \
            -passin env:P12_PASSWORD -out "$private_dir/private-key.pem"
          openssl pkcs12 -legacy -in "$private_dir/certificate.p12" -clcerts -nokeys \
            -passin env:P12_PASSWORD -out "$private_dir/certificate.pem"
          openssl x509 -in "$private_dir/certificate.pem" -outform DER \
            -out "$private_dir/certificate.der"
          printf 'configured certificate sha256: '
          sha256sum "$private_dir/certificate.der" | cut -d ' ' -f 1

      - name: Inventory - build pinned synthetic four-bundle fixture
        shell: bash
        run: |
          set -euo pipefail
          fixture_dir="$RUNNER_TEMP/backend-qualification/fixture"
          mkdir -p "$fixture_dir"
          curl --fail --location --silent --show-error \
            --output "$fixture_dir/LiveContainer.ipa" \
            "https://github.com/LiveContainer/LiveContainer/releases/download/3.8.0/LiveContainer.ipa"
          python3 scripts/build_backend_qualification_fixture.py \
            --source-ipa "$fixture_dir/LiveContainer.ipa" \
            --output-ipa "$fixture_dir/qualification.ipa" \
            --expected-source-sha256 \
            "b6fea95e30083382e29ffef88fa1aaa40b5069e1112e5307d490dab04648bba6"
          unzip -l "$fixture_dir/qualification.ipa"

      - name: Apple plan and optional apply - reconcile private prerequisites
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          args=(
            --certificate-der "$private_dir/certificate.der"
            --private-dir "$private_dir/profiles"
            --summary "$RUNNER_TEMP/backend-qualification/summary.json"
          )
          if [[ "${{ inputs.qualification_apply }}" == "true" ]]; then
            args+=(--apply-bundle-ids --apply-profiles)
          fi
          if [[ "${{ inputs.qualification_reset_names }}" == "true" ]]; then
            args+=(--reset-legacy-names)
          fi
          python3 scripts/qualify_backend_prerequisites.py "${args[@]}"

      - name: Signing and verification - exercise upstream negative control
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          python3 scripts/exercise_zsign_backend.py \
            --zsign "$RUNNER_TEMP/backend-qualification/zsign" \
            --fixture-ipa "$RUNNER_TEMP/backend-qualification/fixture/qualification.ipa" \
            --private-key "$private_dir/private-key.pem" \
            --certificate "$private_dir/certificate.pem" \
            --profiles-dir "$private_dir/profiles" \
            --output-dir "$private_dir/backend-exercise" \
            --summary "$RUNNER_TEMP/backend-qualification/zsign-profile-only-summary.json"

      - name: Signing and verification - exercise qualified backend
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          python3 scripts/exercise_zsign_backend.py \
            --zsign "$RUNNER_TEMP/backend-qualification/zsign-per-profile" \
            --fixture-ipa "$RUNNER_TEMP/backend-qualification/fixture/qualification.ipa" \
            --private-key "$private_dir/private-key.pem" \
            --certificate "$private_dir/certificate.pem" \
            --profiles-dir "$private_dir/profiles" \
            --output-dir "$private_dir/backend-extension-exercise" \
            --summary "$RUNNER_TEMP/backend-qualification/zsign-summary.json" \
            --per-profile-entitlements

      - name: Publication - enforce disabled canary state
        shell: bash
        run: |
          set -euo pipefail
          if env | cut -d= -f1 | grep -Eq '^(R2_ACCESS_KEY_ID|R2_SECRET_ACCESS_KEY|R2_BUCKET)$'; then
            echo "R2 publication credentials must not be present in the canary job." >&2
            exit 1
          fi
          printf '%s\n' \
            '{"mode":"private-canary","publication":"disabled","schema_version":1}' \
            > "$RUNNER_TEMP/backend-qualification/publication-disabled.json"

      - name: Upload redacted Linux qualification summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-qualification-linux
          path: |
            ${{ runner.temp }}/backend-qualification/zsign-profile-only-summary.json
            ${{ runner.temp }}/backend-qualification/zsign-summary.json
            ${{ runner.temp }}/backend-qualification/publication-disabled.json
          if-no-files-found: error
          retention-days: 1

      - name: "Debug: Start SSH session"
        if: ${{ always() && (inputs.debug == true || inputs.debug == 'true' || inputs.debug == '1') }}
        uses: ./.github/actions/ssh-debug
        with:
          public-key: ${{ secrets.DEBUG_SSH_PUBLIC_KEY }}

      - name: Remove private qualification material
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          private_dir="${RUNNER_TEMP:?}/backend-qualification/private"
          test "$private_dir" = "$RUNNER_TEMP/backend-qualification/private"
          rm -rf -- "$private_dir"

  backend-qualification-macos:
    name: Qualify with independent macOS codesign oracle
    needs: backend-qualification
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.backend_qualification == true || inputs.multi_bundle_canary == true) }}
    runs-on: macos-15
    timeout-minutes: 20
    env:
      ASC_VERSION: "3.1.1"
      ASC_MACOS_ARM64_SHA256: "47d9be058359ab29c4f562361abfed710b7f24acdaa79c78777bc6e25e118fef"
      APPLE_DEV_CERT_P12_ENCODED: ${{ secrets.APPLE_DEV_CERT_P12_ENCODED }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_BYPASS_KEYCHAIN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Install checksum-verified App Store Connect CLI
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          asc_bin="asc_${ASC_VERSION}_macOS_arm64"
          base="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VERSION}"
          curl -fLsS -o "$RUNNER_TEMP/$asc_bin" "$base/$asc_bin"
          curl -fLsS -o "$RUNNER_TEMP/asc_checksums.txt" "$base/asc_${ASC_VERSION}_checksums.txt"
          (cd "$RUNNER_TEMP" && grep -F "  $asc_bin" asc_checksums.txt | shasum -a 256 -c -)
          printf '%s  %s\n' "$ASC_MACOS_ARM64_SHA256" "$RUNNER_TEMP/$asc_bin" \
            | shasum -a 256 -c -
          sudo install -m 0755 "$RUNNER_TEMP/$asc_bin" /usr/local/bin/asc
          test "$(asc version | cut -d ' ' -f 1)" = "$ASC_VERSION"
          printf 'asc repository=rorkai/App-Store-Connect-CLI version=%s sha256=%s\n' \
            "$ASC_VERSION" "$ASC_MACOS_ARM64_SHA256"

      - name: Import configured signing identity into an isolated keychain
        shell: bash
        env:
          P12_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          keychain="$RUNNER_TEMP/backend-qualification.keychain-db"
          openssl_bin="$(brew --prefix openssl@3)/bin/openssl"
          mkdir -p "$private_dir"
          printf '%s' "$APPLE_DEV_CERT_P12_ENCODED" \
            | "$openssl_bin" base64 -d -A -out "$private_dir/certificate.p12"
          "$openssl_bin" pkcs12 -legacy -in "$private_dir/certificate.p12" -clcerts -nokeys \
            -passin env:P12_PASSWORD -out "$private_dir/certificate.pem"
          "$openssl_bin" x509 -in "$private_dir/certificate.pem" -outform DER \
            -out "$private_dir/certificate.der"

          keychain_password="$("$openssl_bin" rand -hex 24)"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 1200 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$private_dir/certificate.p12" -k "$keychain" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"

          identities="$(security find-identity -v -p codesigning "$keychain" \
            | sed -nE 's/^[[:space:]]*[0-9]+\) ([[:xdigit:]]{40}) .*/\1/p')"
          identity_count="$(printf '%s\n' "$identities" \
            | awk 'NF { count++ } END { print count + 0 }')"
          if [[ "$identity_count" != "1" ]]; then
            echo "Expected exactly one codesigning identity, found $identity_count." >&2
            exit 1
          fi
          identity="$(printf '%s\n' "$identities" | head -n 1)"
          echo "QUALIFICATION_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          echo "CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          printf 'configured certificate sha256: '
          shasum -a 256 "$private_dir/certificate.der" | cut -d ' ' -f 1

      - name: Build pinned synthetic four-bundle fixture
        shell: bash
        run: |
          set -euo pipefail
          fixture_dir="$RUNNER_TEMP/backend-qualification/fixture"
          mkdir -p "$fixture_dir"
          curl --fail --location --silent --show-error \
            --output "$fixture_dir/LiveContainer.ipa" \
            "https://github.com/LiveContainer/LiveContainer/releases/download/3.8.0/LiveContainer.ipa"
          python3 scripts/build_backend_qualification_fixture.py \
            --source-ipa "$fixture_dir/LiveContainer.ipa" \
            --output-ipa "$fixture_dir/qualification.ipa" \
            --expected-source-sha256 \
            "b6fea95e30083382e29ffef88fa1aaa40b5069e1112e5307d490dab04648bba6"

      - name: Probe private Apple qualification prerequisites
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          python3 scripts/qualify_backend_prerequisites.py \
            --certificate-der "$private_dir/certificate.der" \
            --private-dir "$private_dir/profiles" \
            --summary "$RUNNER_TEMP/backend-qualification/profile-summary.json"

      - name: Verification - exercise independent codesign oracle
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$RUNNER_TEMP/backend-qualification/private"
          python3 scripts/exercise_codesign_oracle.py \
            --fixture-ipa "$RUNNER_TEMP/backend-qualification/fixture/qualification.ipa" \
            --identity "$CODESIGN_IDENTITY" \
            --keychain "$QUALIFICATION_KEYCHAIN" \
            --profiles-dir "$private_dir/profiles" \
            --output-dir "$private_dir/codesign-oracle" \
            --summary "$RUNNER_TEMP/backend-qualification/codesign-summary.json"

      - name: Upload redacted macOS qualification summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-qualification-macos
          path: ${{ runner.temp }}/backend-qualification/codesign-summary.json
          if-no-files-found: error
          retention-days: 1

      - name: Remove private macOS qualification material
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          private_dir="${RUNNER_TEMP:?}/backend-qualification/private"
          test "$private_dir" = "$RUNNER_TEMP/backend-qualification/private"
          rm -rf -- "$private_dir"
          if [[ -n "${QUALIFICATION_KEYCHAIN:-}" ]]; then
            security delete-keychain "$QUALIFICATION_KEYCHAIN"
          fi

  backend-qualification-comparison:
    name: Compare Linux and macOS backend evidence
    needs: [backend-qualification, backend-qualification-macos]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && (inputs.backend_qualification == true || inputs.multi_bundle_canary == true) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Download Linux qualification summary
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-qualification-linux
          path: ${{ runner.temp }}/backend-comparison/linux

      - name: Download macOS qualification summary
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-qualification-macos
          path: ${{ runner.temp }}/backend-comparison/macos

      - name: Verification - compare Linux and macOS evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/compare_backend_qualification.py \
            --linux-summary "$RUNNER_TEMP/backend-comparison/linux/zsign-summary.json" \
            --macos-summary "$RUNNER_TEMP/backend-comparison/macos/codesign-summary.json" \
            --summary "$RUNNER_TEMP/backend-comparison/comparison-summary.json"

      - name: Upload redacted comparison summary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-qualification-comparison
          path: ${{ runner.temp }}/backend-comparison/comparison-summary.json
          if-no-files-found: error
          retention-days: 7
